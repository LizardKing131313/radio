apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: radio

resources:
  - k8s/namespace.yaml
  # Локальный файл с реальными секретами. Он ignored; шаблон рядом в secret.example.yaml.
  - k8s/secret.yaml
  - k8s/postgres.yaml
  - k8s/postgres-backup.yaml
  - k8s/alembic-job.yaml
  - k8s/app.yaml
  - k8s/issuer.yaml
  - k8s/ingress.yaml
  - k8s/network-policy.yaml

configMapGenerator:
  # Статический runtime-конфиг собирается здесь: для деплоя хватает `kubectl apply -k deploy`.
  # Реальные секреты не коммитим.
  - name: radio-config
    files:
      - config.yaml=k8s/config/config.yaml
      - radio.liq=k8s/config/radio.liq
  - name: nginx-config
    files:
      - nginx.conf=k8s/config/nginx.conf
generatorOptions:
  # Стабильные имена держат Deployment и Alembic Job простыми.
  disableNameSuffixHash: true
