paths:
  base: /opt/radio
  data: /opt/radio/data
  cookies: /opt/radio/data/cookies.txt
  cache_cold: /opt/radio/cache/cold
  cache_hot: /opt/radio/cache/hot
  cache_blacklist: /opt/radio/cache/blacklist/state.json
  runtime_fifo_dir: /opt/radio/runtime/fifo
  runtime_info_dir: /opt/radio/runtime/info
  fifo_audio_path: /opt/radio/runtime/fifo/radio.wav
  nowplaying_path: /opt/radio/runtime/info/nowplaying.txt
  youtube_telemetry_path: /opt/radio/runtime/info/youtube_api.json
  www_hls_ts: /opt/radio/www/hls/ts
  www_hls_mp4: /opt/radio/www/hls/mp4
  www_html: /opt/radio/www/html

hls:
  hls_time: 2
  hls_list_size: 6
  hls_delete_threshold: 8
  bitrates: [ 64, 96, 128 ]

search:
  title: "говновоз"
  interval_sec: 21600
  window_size: 50
  max_windows_per_tick: 3
  quota_backoff_sec: 43200

prefetch:
  interval_sec: 10
  cold_quota_bytes: 5368709120
  hot_max_items: 5
  batch_size: 100
  download_timeout_sec: 600
  concurrent_downloads: 4
