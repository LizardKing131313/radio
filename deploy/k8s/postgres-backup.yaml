apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  # Минимальный backup без оператора: один pg_dump в сутки на тот же cache PVC.
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              env:
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: radio-secrets
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: radio-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: radio-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -ec
                - |
                  mkdir -p /backups/postgres
                  target="/backups/postgres/radio-$(date -u +%Y%m%dT%H%M%SZ).dump"
                  pg_dump -h postgres -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -Fc > "${target}"
                  find /backups/postgres -type f -name '*.dump' -mtime +14 -delete
              volumeMounts:
                - name: radio-cache
                  mountPath: /backups
          volumes:
            - name: radio-cache
              persistentVolumeClaim:
                claimName: radio-cache
