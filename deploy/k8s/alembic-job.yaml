apiVersion: batch/v1
kind: Job
metadata:
  name: alembic
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alembic
    spec:
      restartPolicy: OnFailure
      containers:
        # Схемой владеет Alembic. Приложение только проверяет, что таблицы уже есть.
        - name: alembic
          image: radio-manager:latest
          imagePullPolicy: IfNotPresent
          command: [ "alembic", "upgrade", "head" ]
          envFrom:
            - secretRef:
                name: radio-secrets
