apiVersion: v1
kind: Namespace
metadata:
  name: radio
---
apiVersion: v1
kind: LimitRange
metadata:
  name: radio-defaults
spec:
  limits:
    - type: Container
      # Дефолты применяются ко всем контейнерам namespace, если в pod не указаны
      # свои resources. Так манифесты остаются короткими, а pod-ы не попадают в
      # BestEffort QoS.
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      default:
        cpu: 2000m
        memory: 1Gi
