ci:
  autofix_commit_msg: "chore(pre-commit): auto fixes"
  autoupdate_commit_msg: "chore(pre-commit): autoupdate hooks"

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies:
          - alembic>=1.13
          - fastapi>=0.124
          - httpx>=0.28
          - psycopg[binary]>=3.2
          - pytest-builtin-types
          - pydantic>=2.11.10
          - pydantic-settings>=2.11.0
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
        args: [ "--config-file=pyproject.toml" ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
        args: [ "--allow-multiple-documents" ]
      - id: check-toml
      - id: check-json

  - repo: local
    hooks:
      - id: run-tests
        name: Run pytest
        entry: python scripts/precommit_pytest.py
        language: system
        pass_filenames: false
        args:
          - -q
          - --disable-warnings
          - --cov=.
          - --cov-report=term-missing
          - --cov-report=xml
          - --cov-report=html

      - id: coverage-badge-amend
        name: Amend last commit with updated badge
        language: python
        entry: python scripts/badge/badge_amend.py
        pass_filenames: false
        stages: [ post-commit ]
