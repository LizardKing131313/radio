ci:
  autofix_commit_msg: "chore(pre-commit): auto fixes"
  autoupdate_commit_msg: "chore(pre-commit): autoupdate hooks"

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 26.5.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies:
          - alembic>=1.18.4
          - fastapi>=0.136.1
          - httpx>=0.28.1
          - psycopg[binary]>=3.3.4
          - pytest-builtin-types
          - pydantic>=2.13.4
          - pydantic-settings>=2.14.1
          - sqlalchemy>=2.0.49
          - types-PyYAML>=6.0.12.20260510
          - types-requests
        args: [ "--config-file=pyproject.toml" ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
        args: [ "--allow-multiple-documents" ]
      - id: check-toml
      - id: check-json

  - repo: local
    hooks:
      - id: openspec-validate
        name: Validate OpenSpec
        entry: openspec validate --all --strict --no-interactive
        language: node
        additional_dependencies:
          - "@fission-ai/openspec@1.4.1"
        pass_filenames: false

      - id: run-tests
        name: Run pytest
        entry: python scripts/precommit_pytest.py
        language: system
        pass_filenames: false
        args:
          - -q
          - --disable-warnings
          - --cov=.
          - --cov-report=term-missing
          - --cov-report=xml
          - --cov-report=html

      - id: coverage-badge-amend
        name: Amend last commit with updated badge
        language: python
        entry: python scripts/badge/badge_amend.py
        pass_filenames: false
        stages: [ post-commit ]
